
###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher

###################
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = hyprsunset
exec-once = hypridle
exec-once = ~/.config/hypr/scripts/set_wal.sh ~/.wallpaper/good
exec-once = eww -c ~/.config/hypr/ewwbar/ open bar --toggle
exec-once = sudo ryzenadj -a 18000 -b 18000 -c 18000 -f 95
# exec-once = hyprpaper
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
